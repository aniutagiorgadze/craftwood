name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject review token (optional)
        env:
          REVIEW_TOKEN: ${{ secrets.REVIEW_WRITE_TOKEN }}
        run: |
          if [ -n "$REVIEW_TOKEN" ]; then
            node -e "
              const fs = require('fs');
              const p = 'js/config.js';
              let s = fs.readFileSync(p, 'utf8');
              s = s.replace(/reviewWriteToken:\\s*'[^']*'/, \"reviewWriteToken: '\" + process.env.REVIEW_TOKEN + \"'\");
              fs.writeFileSync(p, s);
            "
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
