name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject admin GitHub token
        env:
          ADMIN_GITHUB_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const token = process.env.ADMIN_GITHUB_TOKEN || '';
          const path = 'js/config.js';
          let config = fs.readFileSync(path, 'utf8');
          const safe = token.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
          config = config.replace("'__ADMIN_GITHUB_TOKEN__'", `'${safe}'`);
          fs.writeFileSync(path, config);
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
