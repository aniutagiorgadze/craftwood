<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Craftwood — ხელნაკეთი ავეჯი. ჩვენი ნამუშევრები და პროექტები.">
  <title>Craftwood — ხელნაკეთი ავეჯი</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Noto+Sans+Georgian:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-close" id="sidebar-close" aria-label="მენიუს დახურვა">&times;</button>
      <a href="#featured" class="sidebar-brand">
        <span class="sidebar-brand-name" id="brand-name">Craftwood</span>
        <span class="sidebar-brand-tag">ხელნაკეთი ავეჯი</span>
      </a>
      <nav class="sidebar-nav">
        <a href="#featured" class="sidebar-link" data-view="featured">განსაკუთრებული ნამუშევრები</a>
        <a href="#materials" class="sidebar-link" data-view="materials">მასალები</a>
        <a href="#about" class="sidebar-link" data-view="about">ჩვენს შესახებ</a>
        <a href="#consultation" class="sidebar-link" data-view="consultation">შეუკვეთე კონსულტაცია</a>
        <a href="#gallery" class="sidebar-link" data-view="gallery">სრული ნამუშევრები</a>
      </nav>
      <footer class="sidebar-footer">
        <p>&copy; <span id="footer-year"></span> Craftwood</p>
      </footer>
    </aside>

    <div class="app-main">
      <header class="mobile-header">
        <button class="menu-toggle" id="menu-toggle" aria-label="მენიუ" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <span class="mobile-title" id="mobile-title">Craftwood</span>
      </header>

      <main class="content">
        <section id="view-featured" class="view view--active" data-view="featured">
          <header class="view-header view-header--featured">
            <p class="view-eyebrow">ჩვენი საუკეთესო ნამუშევრები</p>
            <h1 id="featured-title">განსაკუთრებული ნამუშევრები</h1>
            <p id="featured-subtitle"></p>
          </header>
          <div class="gallery-grid gallery-grid--featured" id="featured-grid"></div>
        </section>

        <section id="view-materials" class="view" data-view="materials">
          <header class="view-header">
            <h1 id="materials-title">მასალები</h1>
            <p id="materials-subtitle"></p>
          </header>
          <div class="materials-grid" id="materials-grid"></div>
        </section>

        <section id="view-about" class="view" data-view="about">
          <div class="about-layout">
            <div class="about-text">
              <h1 id="about-title">Craftwood</h1>
              <div id="about-paragraphs"></div>
              <ul class="about-features" id="about-features"></ul>
            </div>
            <div class="about-image">
              <img id="about-image" src="images/placeholder-1.svg" alt="" loading="lazy">
            </div>
          </div>
        </section>

        <section id="view-consultation" class="view" data-view="consultation">
          <div class="consultation-box">
            <h1 id="consultation-title">შეუკვეთე კონსულტაცია</h1>
            <p id="consultation-desc" class="consultation-intro hidden"></p>
            <form class="consultation-form" id="consultation-form">
              <label>
                ტელეფონის ნომერი
                <input type="tel" id="request-phone" required placeholder="მაგ. 555 12 34 56" autocomplete="tel">
              </label>
              <label>
                მოთხოვნა
                <textarea id="request-message" required rows="4" maxlength="1000" placeholder="აღწერეთ რა გჭირდებათ..."></textarea>
              </label>
              <button type="submit" class="btn btn-primary" id="request-submit">გაგზავნა</button>
              <p class="consultation-form-note" id="consultation-form-note"></p>
            </form>
          </div>
        </section>

        <section id="view-gallery" class="view" data-view="gallery">
          <header class="view-header">
            <h1 id="gallery-title">სრული ნამუშევრები</h1>
            <p id="gallery-subtitle"></p>
          </header>
          <div class="gallery-grid" id="gallery-grid"></div>
        </section>
      </main>
    </div>
  </div>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" aria-label="დახურვა">&times;</button>
    <button class="lightbox-prev" aria-label="წინა">&lsaquo;</button>
    <button class="lightbox-next" aria-label="შემდეგი">&rsaquo;</button>
    <div class="lightbox-inner">
      <img class="lightbox-img" src="" alt="">
      <aside class="lightbox-panel">
        <p class="lightbox-caption"></p>
        <div class="lightbox-reviews" id="lightbox-reviews"></div>
        <form class="review-form" id="review-form">
          <h3 class="review-form-title">დატოვე შეფასება</h3>
          <label>
            სახელი
            <input type="text" id="review-author" required maxlength="80" placeholder="თქვენი სახელი">
          </label>
          <label>
            შეფასება
            <div class="star-input" id="review-stars" role="group" aria-label="შეფასება">
              <button type="button" class="star-btn" data-value="1" aria-label="1">★</button>
              <button type="button" class="star-btn" data-value="2" aria-label="2">★</button>
              <button type="button" class="star-btn" data-value="3" aria-label="3">★</button>
              <button type="button" class="star-btn" data-value="4" aria-label="4">★</button>
              <button type="button" class="star-btn" data-value="5" aria-label="5">★</button>
            </div>
            <input type="hidden" id="review-rating" value="5" required>
          </label>
          <label>
            კომენტარი
            <textarea id="review-text" required maxlength="500" rows="3" placeholder="თქვენი კომენტარი..."></textarea>
          </label>
          <button type="submit" class="btn btn-primary btn-sm">გაგზავნა</button>
          <p class="review-form-note" id="review-form-note"></p>
        </form>
      </aside>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/reviews.js"></script>
  <script src="js/requests.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
